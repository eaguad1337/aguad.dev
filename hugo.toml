baseURL = "https://aguad.dev/"
languageCode = "en-us"
title = "Eduardo Aguad"

# Enable Emojis
enableEmojis = true

# Default language
defaultContentLanguage = "en"

# Outputs
[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[params]
  # Site description
  description = "CTO @ meat.cl & blackdoor.cl | Software engineer passionate about technology and databases"
  
  # Author information
  [params.author]
    name = "Eduardo Aguad"
    image = "https://avatars.githubusercontent.com/u/19355144?v=4"
    bio = "Father of one, husband and technology enthusiast."
    
# Main menu
[menu]
  [[menu.main]]
    name = "Work"
    url = "/#work"
    weight = 10
  [[menu.main]]
    name = "Blog"
    url = "/#blog"
    weight = 20
  [[menu.main]]
    name = "About"
    url = "/#about"
    weight = 30
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 40

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github-dark"
    lineNos = true
    tabWidth = 2
